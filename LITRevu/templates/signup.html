<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITRevu</title>
</head>
<body>

    <header>
        <h1>LITRevu</h1>
    </header>
    <main>
        <h2>Inscription</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">S'inscrire</button>
        </form>

        <p>Déjà un compte ? <a href="{% url 'login' %}">Se connecter</a></p>
    </main>
</body>
</html>
