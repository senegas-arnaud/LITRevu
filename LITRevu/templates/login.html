<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITRevu</title>
</head>
<body>

    <header>
        <h1>LITRevu</h1>
    </header>

    <main>
        <h2>Connexion</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Se connecter</button>
        </form>

        <p>Pas encore de compte ? <a href="{% url 'signup' %}">S'inscrire</a></p>
    </main>
</body>
</html>
