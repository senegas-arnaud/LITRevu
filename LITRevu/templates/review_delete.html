{% extends 'base.html' %}

{% block content %}

    <h2>Supprimer le billet</h2>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirmer la suppression</button>
        <a href="{% url 'my_post_review' %}">Annuler</a>
    </form>

{% endblock content %}
