{% extends 'base.html' %}

{% block content %}

    <h2>Créer une critique</h2>

    <div>
        <h3>Billet : {{ ticket.title }}</h3>
        <p>Auteur de l'oeuvre : {{ ticket.author }}</p>
        <p>{{ ticket.description }}</p>
    </div>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Publier</button>
        <a href="{% url 'home' %}">Annuler</a>
    </form>

{% endblock content %}
